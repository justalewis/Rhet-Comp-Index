[pytest]
testpaths = tests
addopts = -ra --strict-markers --strict-config -q -m "not slow and not network"
markers =
    slow: tests that take longer than 1s (deselect with '-m "not slow"')
    network: tests that require network access (excluded by default)
filterwarnings =
    error
    ignore::DeprecationWarning:apscheduler.*
    ignore::DeprecationWarning:dateutil.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::PendingDeprecationWarning
