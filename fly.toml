# fly.toml app configuration file generated for rhet-comp-index on 2026-03-15T10:00:10-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Required secrets (set with `flyctl secrets set`, NOT in [env] below):
#   PINAKES_ADMIN_TOKEN  — bearer token for /fetch and other mutating endpoints
#                          (see auth.py). When unset, mutating endpoints
#                          return HTTP 503; read endpoints continue to work.

app = 'rhet-comp-index'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  FLASK_ENV = 'production'
  DB_PATH = '/data/articles.db'

[[mounts]]
  source = 'rhet_comp_data'
  destination = '/data'
  initial_size = '3gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
