# fly.toml app configuration file generated for rhet-comp-index on 2026-03-15T10:00:10-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rhet-comp-index'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  FLASK_ENV = 'production'

[[mounts]]
  source = 'rhet_comp_data'
  destination = '/data'
  initial_size = '3gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
