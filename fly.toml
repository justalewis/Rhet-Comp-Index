# fly.toml app configuration file generated for rhet-comp-index on 2026-03-15T10:00:10-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Required secrets (set with `flyctl secrets set`, NOT in [env] below):
#   PINAKES_ADMIN_TOKEN  — bearer token for /fetch and other mutating endpoints
#                          (see auth.py). When unset, mutating endpoints
#                          return HTTP 503; read endpoints continue to work.
#
# Optional secrets:
#   SENTRY_DSN           — error monitoring (see monitoring.py). When unset,
#                          error reporting is silently disabled. The free
#                          Sentry tier is sufficient for current traffic.
#
# Backup secrets (all six required for /api/admin/run-backup to succeed;
# missing any one causes the endpoint to return a failure dict and write
# no heartbeat. Reads at runtime, not at startup):
#   PINAKES_BACKUP_BUCKET           e.g. "pinakes-backup"
#   PINAKES_BACKUP_ENDPOINT         e.g. "https://s3.us-west-002.backblazeb2.com"
#   PINAKES_BACKUP_REGION           e.g. "us-west-002"
#   PINAKES_BACKUP_ACCESS_KEY_ID    (B2 / S3 application key id)
#   PINAKES_BACKUP_SECRET_KEY       (B2 / S3 secret)
#   PINAKES_BACKUP_AGE_PUBLIC_KEY   age recipient (age1...). The matching
#                                   PRIVATE key MUST stay off the Fly
#                                   machine — it is the operator's only
#                                   path back from a disaster.
#
# Architecture: single-machine deployment. Daily fetch + nightly backup
# are triggered by .github/workflows/cron.yml hitting POST /fetch and
# POST /api/admin/run-backup at 03:00 UTC. The standalone scheduler.py
# process group (which previously ran on its own Fly machine) was
# removed because Fly volumes are single-attach: the scheduler had no
# way to share /data with the app machine. See
# docs/refactor-notes/13-scheduler-architecture-fix.md.

app = 'rhet-comp-index'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  FLASK_ENV = 'production'
  DB_PATH = '/data/articles.db'

[[mounts]]
  source = 'rhet_comp_data'
  destination = '/data'
  initial_size = '3gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    # Fly's check is a *readiness* concern — should this machine receive
    # traffic? — not a liveness concern. /health/ready confirms the SQLite
    # file is reachable; /health is the bare liveness probe used elsewhere.
    # Both are exempt from rate limiting (see rate_limit.py).
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
