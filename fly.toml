# fly.toml app configuration file generated for rhet-comp-index on 2026-03-15T10:00:10-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Required secrets (set with `flyctl secrets set`, NOT in [env] below):
#   PINAKES_ADMIN_TOKEN  — bearer token for /fetch and other mutating endpoints
#                          (see auth.py). When unset, mutating endpoints
#                          return HTTP 503; read endpoints continue to work.
#
# Optional secrets:
#   SENTRY_DSN           — error monitoring (see monitoring.py). When unset,
#                          error reporting is silently disabled. The free
#                          Sentry tier is sufficient for current traffic.
#
# Process groups (see [processes] below):
#   app        — gunicorn web server. Receives all HTTP traffic.
#   scheduler  — APScheduler BlockingScheduler running scheduler.py. No HTTP.
# After deploying, scale the scheduler to one machine ONCE:
#   flyctl scale count app=1 scheduler=1

app = 'rhet-comp-index'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  FLASK_ENV = 'production'
  DB_PATH = '/data/articles.db'

[processes]
  # The web process. Same gunicorn invocation that the Dockerfile uses as
  # its CMD fallback; the [processes] entry overrides CMD on Fly.
  app = "gunicorn --bind 0.0.0.0:8080 --workers 1 --timeout 120 --capture-output --log-level info app:app"
  # The scheduler process. Standalone APScheduler BlockingScheduler. Writes
  # /data/scheduler.heartbeat every cycle so /health/deep can verify it is
  # actually running. With min_machines_running=1 and one machine per
  # process group, there is exactly one scheduler at any time, so no
  # double-fetch coordination is needed.
  scheduler = "python scheduler.py"

[[mounts]]
  source = 'rhet_comp_data'
  destination = '/data'
  initial_size = '3gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  # Only the app process group serves HTTP. The scheduler does not bind a
  # port, so excluding it here prevents Fly from health-checking it as a
  # web service.
  processes = ["app"]

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    # Fly's check is a *readiness* concern — should this machine receive
    # traffic? — not a liveness concern. /health/ready confirms the SQLite
    # file is reachable; /health is the bare liveness probe used elsewhere.
    # Both are exempt from rate limiting (see rate_limit.py).
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
