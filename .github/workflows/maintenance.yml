# Weekly maintenance: triggers the citation/enrichment pipeline against
# production. The daily cron (cron.yml) covers article ingest and backup;
# this workflow covers everything that keeps the citation graph and
# enrichment data in sync with the article index — the half of
# weekly_maintenance.py that was previously never scheduled:
#
#   step 4  cite_fetcher        (CrossRef reference lists for new articles;
#                                resyncs internal_cited_by/cites counters)
#   step 5  OpenAlex enrichment (abstracts, OA status, affiliations)
#   step 6  LiCS reference scrape
#   step 7  retag + FTS rebuild
#   step 8  OA status backfill
#   step 9  OpenAlex citation counts
#
# Runs Sundays at 04:00 UTC, an hour after that day's fetch. The endpoint
# returns 200 immediately and runs the pipeline in a background thread;
# per-step summaries surface in fly logs.
#
# Required repository secret: PINAKES_ADMIN_TOKEN (same as cron.yml).

name: Weekly maintenance

on:
  schedule:
    # 04:23 UTC Sundays (off the hour to dodge GitHub's ':00' throttling),
    # an hour after that day's 03:23 fetch. The maintenance pipeline waits on
    # the shared _fetch_lock, so it's safe even if the fetch runs long.
    - cron: '23 4 * * 0'
  workflow_dispatch:

jobs:
  maintenance:
    name: Trigger /api/admin/run-maintenance
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/run-maintenance
        run: |
          # Transient-tolerant retry (503 under load / worker recycle); 409
          # means a maintenance run is already in progress — benign.
          ok=""
          for attempt in 1 2 3 4 5; do
            response=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 \
              -X POST https://pinakes.xyz/api/admin/run-maintenance \
              -H "Authorization: Bearer ${{ secrets.PINAKES_ADMIN_TOKEN }}" || echo "000")
            echo "Attempt $attempt: HTTP $response"
            case "$response" in
              200|202) ok="started"; break ;;
              409)     echo "Maintenance already in progress (409) — fine."
                       ok="already-running"; break ;;
              *)       if [ "$attempt" -lt 5 ]; then
                         echo "Transient response $response; retrying in 60s..."
                         sleep 60
                       fi ;;
            esac
          done
          if [ -z "$ok" ]; then
            echo "::error::POST /api/admin/run-maintenance did not succeed after retries (last: $response)"
            exit 1
          fi
          echo "Result: $ok"
