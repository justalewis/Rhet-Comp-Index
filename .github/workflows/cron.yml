# Daily cron: triggers Pinakes's fetch and backup against the production
# app at pinakes.xyz. Replaces the standalone scheduler.py process group
# that was removed in refactor-notes/13 because Fly volumes are
# single-attach (the scheduler had no way to share /data with the app).
#
# Required repository secret: PINAKES_ADMIN_TOKEN — same value as the
# Fly secret of the same name. Set via Settings -> Secrets and variables
# -> Actions -> New repository secret.

name: Daily fetch + backup

on:
  schedule:
    # 03:23 UTC daily. Cron syntax: minute hour day month dow.
    # NOT on the hour: GitHub throttles ':00' crons hard — these runs were
    # firing ~3.5h late (06:40) or being dropped entirely. An off-peak minute
    # schedules far more reliably. Still best-effort; may delay a few minutes.
    - cron: '23 3 * * *'
  # Manual trigger from the Actions tab for testing or emergency runs.
  workflow_dispatch:

jobs:
  fetch:
    name: Trigger /fetch
    runs-on: ubuntu-latest
    steps:
      - name: POST /fetch (async; returns 200 immediately, fetch runs in background)
        run: |
          # Retry transient failures. The single-machine origin can briefly
          # return 503 under load or while the worker recycles; 409 means a
          # fetch is already running (the _fetch_lock doing its job). Both are
          # benign — not workflow failures. Only a persistent error after all
          # retries reds the job. (incident 2026-06-26: a transient 503 here
          # hard-failed the daily cron.)
          ok=""
          for attempt in 1 2 3 4 5; do
            response=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 \
              -X POST https://pinakes.xyz/fetch \
              -H "Authorization: Bearer ${{ secrets.PINAKES_ADMIN_TOKEN }}" || echo "000")
            echo "Attempt $attempt: HTTP $response"
            case "$response" in
              200|202) ok="started"; break ;;
              409)     echo "A fetch is already running (409) — nothing to do."
                       ok="already-running"; break ;;
              *)       if [ "$attempt" -lt 5 ]; then
                         echo "Transient response $response; retrying in 60s..."
                         sleep 60
                       fi ;;
            esac
          done
          if [ -z "$ok" ]; then
            echo "::error::POST /fetch did not succeed after retries (last: $response)"
            exit 1
          fi
          echo "Result: $ok"

  prewarm:
    name: Trigger /api/admin/prewarm
    runs-on: ubuntu-latest
    # The fetch invalidates the Datastories disk cache whenever it changes
    # the data, so re-warm the heavy analyses (sampled betweenness, SPC
    # main paths, Louvain, author co-citation) right after it lands. The
    # endpoint returns 200 immediately and computes in a background
    # thread; the day's first visitors then get disk-cache speed instead
    # of a multi-minute compute.
    needs: fetch
    steps:
      - name: Wait 15 minutes for the async fetch to finish most of its work
        run: sleep 900

      - name: POST /api/admin/prewarm
        run: |
          # Same transient-tolerant retry as /fetch. Pre-warming is a
          # nice-to-have (the cache rebuilds lazily on first visit anyway), so
          # a transient blip must never red the workflow.
          ok=""
          for attempt in 1 2 3 4 5; do
            response=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 \
              -X POST https://pinakes.xyz/api/admin/prewarm \
              -H "Authorization: Bearer ${{ secrets.PINAKES_ADMIN_TOKEN }}" || echo "000")
            echo "Attempt $attempt: HTTP $response"
            case "$response" in
              200|202) ok="warmed"; break ;;
              409)     echo "Prewarm already in progress (409) — fine."
                       ok="already-running"; break ;;
              *)       if [ "$attempt" -lt 5 ]; then
                         echo "Transient response $response; retrying in 60s..."
                         sleep 60
                       fi ;;
            esac
          done
          if [ -z "$ok" ]; then
            echo "::error::POST /api/admin/prewarm did not succeed after retries (last: $response)"
            exit 1
          fi
          echo "Result: $ok"

  backup:
    name: Trigger /api/admin/run-backup
    runs-on: ubuntu-latest
    # Run after fetch so today's fetched articles are included in tonight's
    # snapshot. Fetch is async, so we sleep briefly to let it land most
    # records before snapshotting. If the fetch is still running when we
    # snapshot, that's fine: SQLite's online .backup API is consistent
    # under concurrent writes; today's late-arriving rows just land in
    # tomorrow's backup instead.
    needs: fetch
    steps:
      - name: Wait 10 minutes for the async fetch to finish most of its work
        run: sleep 600

      - name: POST /api/admin/run-backup (async; 200 means kicked-off, not finished)
        run: |
          # The endpoint returns 200 immediately and runs the
          # snapshot→zstd→age→B2 pipeline in a background thread (the
          # pipeline itself takes 2–5 minutes on a 1-CPU Fly machine,
          # which exceeds gunicorn's worker timeout if run
          # synchronously, producing a 502). Success or failure of the
          # actual backup surfaces in `fly logs` as "Backup succeeded:
          # {...}" / "Backup failed: {...}" lines, and the heartbeat
          # file at /data/scheduler.heartbeat is touched on success.
          # Retry a transient kick-off failure (503 under load / worker
          # recycle) before reding the job; a genuine misconfiguration still
          # surfaces in the response body and fails after retries.
          status=""
          for attempt in 1 2 3 4 5; do
            response=$(curl -sS --max-time 60 -X POST https://pinakes.xyz/api/admin/run-backup \
              -H "Authorization: Bearer ${{ secrets.PINAKES_ADMIN_TOKEN }}" \
              -w "\nHTTP_STATUS:%{http_code}" || echo "HTTP_STATUS:000")
            status=$(echo "$response" | grep "^HTTP_STATUS:" | cut -d: -f2)
            body=$(echo "$response" | sed '/^HTTP_STATUS:/d')
            echo "Attempt $attempt: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Response body:"; echo "$body" | head -50
              break
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "Transient response $status; retrying in 60s..."
              sleep 60
            fi
          done
          if [ "$status" != "200" ]; then
            echo "::error::Backup kick-off failed with status $status after retries"
            exit 1
          fi
          echo "Backup kicked off. Watch fly logs for completion summary."
