# Fly.io continuous deployment.
#
# Trigger:  fires only when the Tests workflow (.github/workflows/test.yml)
#           completes successfully on `main`. We use workflow_run rather
#           than `push` so a failing test run blocks deploy.
# Strategy: --strategy immediate replaces the running machine in place,
#           which is what we want since gunicorn is single-worker and
#           rolling deploys would briefly serve from two instances racing
#           on the same SQLite file.
# Concurrency: only one Fly deploy may run at a time across this repo.
#
# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
